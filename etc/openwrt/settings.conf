# Global settings for naive-backup (OpenWrt default)

# (Required) The GPG key ID or email address of the recipient.
# ENCRYPT_RECIPIENT="your-gpg-email@example.com"

# (Required) The directory to store backup files.
# Tip: On OpenWrt, you might want to point this to an external drive (e.g., /mnt/sda1)
BACKUPDIR="/tmp/backups"

# (Optional) A prefix for all backup files.
# PREFIX="my-router-backup"

# (Optional) The percentage difference at which to create a new full backup.
# SIZE_THRESHOLD=15

# (Required for content-based backups) Work directory with 0700 permissions.
# Tip: Ensure this is on persistent storage if possible.
# CONTENT_WORK_DIR="/etc/naivebackup/work"
