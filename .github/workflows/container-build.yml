name: Build and Push Publish Tools Image

on:
  push:
    paths:
      - '.github/docker/publish-tools/Dockerfile'
  workflow_dispatch: # Allows manual trigger from UI

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required for pushing to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .github/docker/publish-tools/
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/publish-tools:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
