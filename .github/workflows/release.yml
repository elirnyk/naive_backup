name: Release Packager and Publisher

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-deb:
    name: Build Debian Package
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.get_filename.outputs.package_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y devscripts debhelper build-essential

      - name: Set Version in Changelog
        env:
          DEBEMAIL: "actions@github.com"
          DEBFULLNAME: "GitHub Actions"
        run: |
          VERSION="${{ github.ref_name }}"
          dch -v "${VERSION#v}-1" "New release ${VERSION}."
          cat debian/changelog

      - name: Build .deb package
        run: dpkg-buildpackage -us -uc -b

      - name: Move package to current directory
        run: mv ../*.deb .

      - name: Get Package Filename
        id: get_filename
        run: echo "package_name=$(ls *.deb)" >> $GITHUB_OUTPUT

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

  build-ipk:
    name: Build OpenWrt Package (manual)
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.get_filename.outputs.package_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Staging Directory
        run: |
          mkdir -p staging/control
          mkdir -p staging/data/usr/bin

      - name: Create OPKG Control File
        run: |
          cat << EOF > staging/control/control
          Package: naive-backup
          Version: ${{ github.ref_name }}
          Depends: busybox, findutils, coreutils-stat, coreutils-sort, tar, gpg, sed
          Architecture: all
          Maintainer: Gemini CLI <gemini-cli@google.com>
          Description: A simple shell-based backup script.
          EOF

      - name: Copy Script
        run: |
          cp naive_backup.sh staging/data/usr/bin/naive-backup
          chmod +x staging/data/usr/bin/naive-backup

      - name: Build .ipk package manually
        id: build_ipk
        run: |
          PACKAGE_NAME="naive-backup_${{ github.ref_name }}_all.ipk"
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          
          echo "2.0" > debian-binary
          (cd staging/control && tar -czf ../../control.tar.gz control)
          (cd staging/data && tar -czf ../../data.tar.gz usr)
          ar rcs "$PACKAGE_NAME" debian-binary control.tar.gz data.tar.gz

      - name: Upload .ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-package
          path: naive-backup_${{ github.ref_name }}_all.ipk

  publish:
    name: Publish to GitHub Pages
    needs: [build-deb, build-ipk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y apt-utils gnupg

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: dist/deb

      - name: Download .ipk artifact
        uses: actions/download-artifact@v4
        with:
          name: ipk-package
          path: dist/ipk

      - name: Import GPG Key
        id: import_gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-keys --with-colons | grep 'fpr' | head -n 1 | cut -d: -f10)
          echo "key_id=$GPG_KEY_ID" >> $GITHUB_OUTPUT
          echo "Imported GPG key $GPG_KEY_ID"

      - name: Update APT Repository
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p gh-pages/apt
          mv dist/deb/${{ needs.build-deb.outputs.package_name }} gh-pages/apt/
          cd gh-pages/apt
          apt-ftparchive packages . > Packages
          gzip -c Packages > Packages.gz
          apt-ftparchive release . > Release
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --clearsign -u "${{ steps.import_gpg.outputs.key_id }}" -o InRelease Release
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" -abs -u "${{ steps.import_gpg.outputs.key_id }}" -o Release.gpg Release
          cd ../..

      - name: Update OPKG Repository
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p gh-pages/opkg
          mv dist/ipk/*.ipk gh-pages/opkg/
          cd gh-pages/opkg
          
          # Manual opkg-generate-index implementation
          rm -f Packages Packages.gz
          for pkg in *.ipk; do
            [ -f "$pkg" ] || continue
            ar x "$pkg" control.tar.gz
            tar -xzOf control.tar.gz control >> Packages
            printf "Filename: %s\nSize: %s\nSHA256sum: %s\n\n" \
              "$pkg" "$(stat -c%s "$pkg")" "$(sha256sum "$pkg" | cut -d' ' -f1)" >> Packages
            rm -f control.tar.gz
          done
          gzip -c Packages > Packages.gz
          
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --detach-sign --armor -u "${{ steps.import_gpg.outputs.key_id }}" Packages
          cd ../..
      
      - name: Export Public GPG key
        run: |
          gpg --export --armor "${{ steps.import_gpg.outputs.key_id }}" > gh-pages/public.key

      - name: Commit and Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          if git diff-index --quiet HEAD; then
            echo "No changes to commit."
          else
            git commit -m "Publish packages for ${{ github.ref_name }}"
            git push
          fi
