name: Release Packager and Publisher

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-deb:
    name: Build Debian Package
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.get_filename.outputs.package_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y devscripts debhelper build-essential

      - name: Set Version in Changelog
        env:
          DEBEMAIL: "actions@github.com"
          DEBFULLNAME: "GitHub Actions"
        run: |
          VERSION="${{ github.ref_name }}"
          dch -v "${VERSION#v}-1" "New release ${VERSION}."
          cat debian/changelog

      - name: Build .deb package
        run: dpkg-buildpackage -us -uc -b

      - name: Move package to current directory
        run: mv ../*.deb .

      - name: Get Package Filename
        id: get_filename
        run: echo "package_name=$(ls *.deb)" >> $GITHUB_OUTPUT

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: deb-package
          path: '*.deb'

  build-ipk:
    name: Build OpenWrt Package (manual)
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.build_ipk.outputs.package_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create Staging Directory
        run: |
          mkdir -p staging/control
          mkdir -p staging/data/usr/bin

      - name: Create OPKG Control File
        run: |
          VERSION="${{ github.ref_name }}"
          cat << EOF > staging/control/control
          Package: naive-backup
          Version: ${VERSION#v}
          Depends: bzip2, coreutils-stat, gnupg
          Architecture: all
          Maintainer: Gemini CLI <gemini-cli@google.com>
          Description: A simple shell-based backup script.
          EOF

      - name: Copy Script
        run: |
          cp naive_backup.sh staging/data/usr/bin/naive-backup
          chmod +x staging/data/usr/bin/naive-backup

      - name: Build .ipk package manually
        id: build_ipk
        run: |
          VERSION="${{ github.ref_name }}"
          PKG_VER="${VERSION#v}"
          PACKAGE_NAME="naive-backup_${PKG_VER}_all.ipk"
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          
          printf "2.0\n" > debian-binary
          
          # Create control.tar.gz with numeric root ownership
          (cd staging/control && tar --numeric-owner --owner=0 --group=0 -czf ../../control.tar.gz .)
          
          # Create data.tar.gz with numeric root ownership
          (cd staging/data && tar --numeric-owner --owner=0 --group=0 -czf ../../data.tar.gz .)
          
          # Build .ipk as tar.gz (native OpenWrt format used by official repos)
          rm -f "$PACKAGE_NAME"
          tar --numeric-owner --owner=0 --group=0 -czf "$PACKAGE_NAME" debian-binary control.tar.gz data.tar.gz
          
          # Verify IPK is valid
          echo "Verifying IPK structure..."
          file "$PACKAGE_NAME"

      - name: Upload .ipk artifact
        uses: actions/upload-artifact@v7
        with:
          name: ipk-package
          path: naive-backup_*.ipk

  publish:
    name: Publish to GitHub Pages
    needs: [build-deb, build-ipk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Build libubox
        run: |
          cd /tmp
          git clone --depth 1 https://github.com/openwrt/libubox.git
          cd libubox
          mkdir build && cd build
          cmake .. && make
          sudo make install

      - name: Build usign
        run: |
          cd /tmp
          git clone --depth 1 https://github.com/openwrt/usign.git
          cd usign
          mkdir build && cd build
          cmake .. && make
          sudo make install
          usign -V

      - name: Setup usign key
        env:
          USIGN_KEY: ${{ secrets.USIGN_KEY }}
        run: |
          if [ -z "$USIGN_KEY" ]; then
            echo "ERROR: USIGN_KEY secret not set!"
            exit 1
          fi
          echo "$USIGN_KEY" | base64 -d > repokey.sec
          chmod 600 repokey.sec

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: deb-package
          path: dist/deb

      - name: Download .ipk artifact
        uses: actions/download-artifact@v8
        with:
          name: ipk-package
          path: dist/ipk

      - name: Import GPG Key
        id: import_gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-keys --with-colons | grep 'fpr' | head -n 1 | cut -d: -f10)
          echo "key_id=$GPG_KEY_ID" >> $GITHUB_OUTPUT
          echo "Imported GPG key $GPG_KEY_ID"

      - name: Update APT Repository
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p gh-pages/apt
          mv dist/deb/${{ needs.build-deb.outputs.package_name }} gh-pages/apt/
          cd gh-pages/apt
          apt-ftparchive packages . > Packages
          gzip -c Packages > Packages.gz
          apt-ftparchive release . > Release
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --clearsign -u "${{ steps.import_gpg.outputs.key_id }}" -o InRelease Release
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" -abs -u "${{ steps.import_gpg.outputs.key_id }}" -o Release.gpg Release
          cd ../..

      - name: Update OPKG Repository and Sign
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p gh-pages/opkg
          VERSION="${{ github.ref_name }}"
          PKG_VER="${VERSION#v}"
          PKGNAME="naive-backup_${PKG_VER}_all.ipk"
          
          # 1. Download all previous IPK packages from GitHub Releases to ensure a complete repository
          echo "Syncing previous .ipk packages from GitHub Releases..."
          gh release list --limit 100 | awk '{print $1}' | while read -r tag; do
            gh release download "$tag" -p "*.ipk" -D gh-pages/opkg --clobber 2>/dev/null || true
          done

          # 2. Move the newly built package
          mv "dist/ipk/$PKGNAME" gh-pages/opkg/ 2>/dev/null || true
          
          cd gh-pages/opkg
          
          # 3. Generate Packages file from ALL .ipk files in the directory
          echo "Generating Packages index..."
          rm -f Packages Packages.gz Packages.sig
          # Use a temporary directory for unique package indexing
          mkdir -p idx_tmp
          for pkg in *.ipk; do
            [ -f "$pkg" ] || continue
            # Avoid duplicate indexing if same filename exists (e.g. from gh release download)
            [ -f "idx_tmp/$pkg.done" ] && continue
            echo "Indexing $pkg..."
            # Extract control file
            rm -rf control control.tar.gz
            tar -xzf "$pkg" control.tar.gz 2>/dev/null || continue
            tar -xzf control.tar.gz ./control 2>/dev/null || tar -xzf control.tar.gz control 2>/dev/null || true
            
            # Append to Packages
            if [ -f control ]; then
              cat control >> Packages
            elif [ -f control/control ]; then
              cat control/control >> Packages
            fi
            printf "Filename: %s\nSize: %s\nSHA256sum: %s\n\n" \
              "$pkg" "$(stat -c%s "$pkg")" "$(sha256sum "$pkg" | cut -d' ' -f1)" >> Packages
            rm -rf control control.tar.gz
            touch "idx_tmp/$pkg.done"
          done
          rm -rf idx_tmp
          
          # Remove any potential triple newlines and ensure it ends with a single newline after the last blank line
          sed -i '/^$/N;/^\n$/D' Packages
          
          gzip -c Packages > Packages.gz

          # 4. Sign Packages with usign
          usign -S -m Packages -s repokey.sec -x Packages.sig
          cd ../..

      - name: Export Public GPG key
        run: |
          gpg --export --armor "${{ steps.import_gpg.outputs.key_id }}" > gh-pages/public.key

      - name: Commit and Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          if git diff-index --quiet HEAD; then
            echo "No changes to commit."
          else
            git commit -m "Publish packages for ${{ github.ref_name }}"
            git push
          fi

  github-release:
    name: Create GitHub Release
    needs: [build-deb, build-ipk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: deb-package
          path: .

      - name: Download .ipk artifact
        uses: actions/download-artifact@v8
        with:
          name: ipk-package
          path: .

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            *.deb \
            *.ipk \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes

